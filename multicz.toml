# multicz.toml - versioning, changelog and tagging driven by Conventional
# Commits. Docs: https://goabonga.github.io/multicz/

[project]
commit_convention = "conventional"
# Existing tags use the "v" prefix (v0.1.0, v0.1.1), so keep it.
tag_format = "v{version}"
initial_version = "0.1.1"
# Regenerate uv.lock after each bump so the lockfile records the new
# version; without `allow` multicz skips the hook and the next
# `uv sync --frozen` in CI fails on lockfile drift.
post_bump_policy = "allow"
state_file = ".multicz/state.json"

[project.bump_rules]
feat = "minor"
fix = "patch"
perf = "patch"
revert = "patch"
deprecate = "minor"
remove = "minor"

[[project.changelog_sections]]
title = "Added"
types = ["feat"]

[[project.changelog_sections]]
title = "Deprecated"
types = ["deprecate"]

[[project.changelog_sections]]
title = "Removed"
types = ["remove"]

[[project.changelog_sections]]
title = "Fixed"
types = ["fix"]

[[project.changelog_sections]]
title = "Performance"
types = ["perf"]

[components.md-cv-gen]
# The deliverable is the module plus the packaging metadata shipped to
# PyPI under the name md-cv-gen.
paths = ["src/**", "pyproject.toml"]
bump_files = [
    { file = "pyproject.toml", key = "project.version" },
]
changelog = "CHANGELOG.md"
post_bump = ["uv lock"]

[[components.md-cv-gen.artifacts]]
type = "pypi"
ref = "md-cv-gen=={version}"
